<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Mastercard | Grupo 05</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>   
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <svg
        aria-hidden="true"
        focusable="false"
        width="0"
        height="0"
        style="position: absolute; width: 0; height: 0; overflow: hidden;"
    >
        <defs>
            <filter id="cb-filter-protanopia" color-interpolation-filters="sRGB">
                <feColorMatrix
                    type="matrix"
                    values="0.567 0.433 0     0 0
                            0.558 0.442 0     0 0
                            0     0.242 0.758 0 0
                            0     0     0     1 0"
                />
            </filter>
            <filter id="cb-filter-deuteranopia" color-interpolation-filters="sRGB">
                <feColorMatrix
                    type="matrix"
                    values="0.625 0.375 0   0 0
                            0.700 0.300 0   0 0
                            0     0.300 0.7 0 0
                            0     0     0   1 0"
                />
            </filter>
            <filter id="cb-filter-tritanopia" color-interpolation-filters="sRGB">
                <feColorMatrix
                    type="matrix"
                    values="0.95  0.05  0     0 0
                            0     0.433 0.567 0 0
                            0     0.475 0.525 0 0
                            0     0     0     1 0"
                />
            </filter>
        </defs>
    </svg>
    <script type="module" src="src/app.js"></script>
</body>
</html>
